services:
  e2e:
    build:
      context: .
      dockerfile: Dockerfile.e2e
    working_dir: /app
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mema}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:-mema}
      TZ: UTC
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: ["bun", "run", "test:e2e"]
